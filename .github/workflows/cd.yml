name: CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build & run tests
        run: ./gradlew build --no-daemon

      - name: Build Docker image
        run: docker build -t auth-service:${{ github.sha }} .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag auth-service:$IMAGE_TAG $ECR_REGISTRY/auth-service:$IMAGE_TAG
          docker tag auth-service:$IMAGE_TAG $ECR_REGISTRY/auth-service:latest
          docker push $ECR_REGISTRY/auth-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/auth-service:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            cd /app

            # Зберігаємо поточний тег на випадок rollback
            PREVIOUS_TAG=$(cat .auth-image-tag 2>/dev/null || echo "latest")

            # Деплоїмо новий образ
            IMAGE_TAG=${{ github.sha }} docker-compose -f docker-compose.prod.yml pull auth-service
            IMAGE_TAG=${{ github.sha }} docker-compose -f docker-compose.prod.yml up -d --no-deps auth-service

            # Health check: 10 спроб по 15 секунд = 2.5 хвилини
            HEALTHY=false
            for i in $(seq 1 10); do
              sleep 15
              if docker inspect grainflow-auth --format='{{.State.Health.Status}}' | grep -q "healthy"; then
                echo "Health check passed (attempt $i)"
                HEALTHY=true
                break
              fi
              echo "Attempt $i/10 failed, retrying..."
            done

            if [ "$HEALTHY" = "true" ]; then
              echo "${{ github.sha }}" > .auth-image-tag
              echo "Deploy successful"
            else
              echo "Health check failed, rolling back to $PREVIOUS_TAG..."
              IMAGE_TAG=$PREVIOUS_TAG docker-compose -f docker-compose.prod.yml pull auth-service
              IMAGE_TAG=$PREVIOUS_TAG docker-compose -f docker-compose.prod.yml up -d --no-deps auth-service
              exit 1
            fi
