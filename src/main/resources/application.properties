# App
spring.application.name=auth-service
server.port=${PORT:8081}

server.servlet.context-path=/api/v1

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/grainflow_auth}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.open-in-view=false

# Flyway enabled by default, overridden per profile
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-make-it-long-enough-for-hs256}
jwt.access-token-expiration=9000000
jwt.refresh-token-expiration=604800000

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
spring.kafka.consumer.group-id=auth-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.grainflow.auth.kafka.SubscriptionStatusEvent

# Actuator
management.endpoints.web.exposure.include=health,info

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
